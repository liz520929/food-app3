<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>食材庫存App</title>

<style>
body{
  font-family:-apple-system;
  margin:0;
  background:#f5f7fb;
}
.app{max-width:420px;margin:auto;padding:16px;}
.title{font-size:28px;font-weight:800;margin-bottom:10px;}
.card{background:#fff;padding:14px;border-radius:16px;margin-bottom:12px;}
input,select,button{
  width:100%;padding:10px;margin-top:6px;border-radius:10px;border:1px solid #ddd;
}
button{background:#111;color:#fff;border:none;font-weight:600;}
.item{background:#fff;padding:12px;border-radius:12px;margin-bottom:8px;}
.badge{font-size:12px;padding:4px 8px;border-radius:20px;}
.green{background:#dcfce7;color:#16a34a;}
.yellow{background:#fef9c3;color:#ca8a04;}
.red{background:#fee2e2;color:#dc2626;}
</style>
</head>

<body>
<div class="app">

<div class="title">🍱 食材庫存</div>

<div class="card">
<input id="name" placeholder="食材名稱">
<input id="qty" type="number" value="1">
<input id="purchase" type="date">
<input id="expiry" type="date">
<select id="location">
<option>冷藏</option>
<option>冷凍</option>
<option>常溫</option>
</select>
<button onclick="addItem()">新增</button>
</div>

<div id="list"></div>

<div class="title">🍳 推薦食譜</div>
<div id="recipes"></div>

<div class="card">
<button onclick="aiRecommend()">✨ AI推薦（進階）</button>
<div id="aiResult"></div>
</div>

</div>

<script>
let items = JSON.parse(localStorage.getItem("data")||"[]");

function save(){
localStorage.setItem("data",JSON.stringify(items));
}

function days(exp){
return Math.floor((new Date(exp)-new Date())/(1000*60*60*24));
}

function status(exp){
let d=days(exp);
if(d<0) return "red";
if(d<=2) return "yellow";
return "green";
}

function addItem(){
let name=document.getElementById("name").value;
let qty=document.getElementById("qty").value;
let purchase=document.getElementById("purchase").value;
let expiry=document.getElementById("expiry").value;
let location=document.getElementById("location").value;

if(!name||!expiry)return;

items.push({id:Date.now(),name,qty,purchase,expiry,location});
save();
render();
}

function remove(id){
items=items.filter(i=>i.id!==id);
save();
render();
}

function render(){
let list=document.getElementById("list");

list.innerHTML=items.map(i=>`
<div class="item">
<b>${i.name} x ${i.qty}</b><br>
購買:${i.purchase||"-"}<br>
到期:${i.expiry}<br>
位置:${i.location}
<div class="badge ${status(i.expiry)}">${days(i.expiry)}天</div>
<button onclick="remove(${i.id})">刪除</button>
</div>
`).join("");

renderRecipes();
}

function getType(name){
if(name.includes("肉")||name.includes("雞")||name.includes("牛")||name.includes("豬")||name.includes("羊")||name.includes("蝦")||name.includes("魚")) return "protein";
if(name.includes("蛋")) return "egg";
if(name.includes("菜")||name.includes("瓜")) return "veg";
return "other";
}

function renderRecipes(){
let recipes=[];
let proteins=items.filter(i=>getType(i.name)=="protein");
let eggs=items.filter(i=>getType(i.name)=="egg");
let veg=items.filter(i=>getType(i.name)=="veg");

proteins.forEach(p=>{
recipes.push(p.name+"炒蛋");
recipes.push("香煎"+p.name);
recipes.push(p.name+"炒青菜");
});

if(eggs.length&&veg.length){
recipes.push(veg[0].name+"炒蛋");
}

recipes=[...new Set(recipes)];

document.getElementById("recipes").innerHTML=
recipes.map(r=>`<div class="item">${r}</div>`).join("");
}

function aiRecommend(){
let names=items.map(i=>i.name).join(",");
document.getElementById("aiResult").innerHTML=
"👉 AI建議：可用 "+names+" 做創意料理（之後可接API）";
}

render();
</script>

</body>
</html>
